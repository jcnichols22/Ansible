# Shared defaults — payload-safe, no secrets.

users:
  - name: josh
    ssh_key: ""
    sudo: true
  - name: ansible
    ssh_key: ""
    sudo: true
    nopasswd: true

docker_service_sync_media_server_host: "192.168.0.34"
docker_service_sync_media_server_user: "ansible"
docker_service_sync_media_server_ssh_key: "~/.ssh/ansible"
docker_service_sync_compose_owner: "josh"
docker_service_sync_compose_dir: "/home/{{ docker_service_sync_compose_owner }}/media"
docker_service_sync_venv_path: "{{ playbook_dir }}/../.venv/service-host-sync"
docker_service_sync_no_log: true
docker_service_sync_service_exclude: []
docker_service_sync_service_overrides: {}
