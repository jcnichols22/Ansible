---
- name: Sync inventory hosts to NetBox
  hosts: localhost
  gather_facts: false
  vars_files:
    - ../inventory/prod/group_vars/all.yml
  vars:
    netbox_sync_venv_path: "{{ playbook_dir }}/../.venv/netbox-sync"

  tasks:
    - name: Load local NetBox secrets if present (git-ignored)
      ansible.builtin.include_vars:
        file: ../inventory/prod/group_vars/netbox_secrets.local.yml
      ignore_errors: true

    - name: Validate NetBox configuration is present
      ansible.builtin.assert:
        that:
          - netbox_url is defined
          - netbox_url | length > 0
          - netbox_token is defined
          - netbox_token | length > 0
        fail_msg: >-
          Define netbox_url and netbox_token in inventory/prod/group_vars/netbox_secrets.local.yml.

    - name: Initialize host sync list
      ansible.builtin.set_fact:
        netbox_hosts_effective: []

    - name: Build host sync payload from inventory
      ansible.builtin.set_fact:
        netbox_hosts_effective: "{{ netbox_hosts_effective + [ {
          'name': item,
          'mgmt_ip': (hostvars[item].ansible_host | default('')),
          'site': (hostvars[item].netbox_site | default(netbox_default_site)),
          'role': (hostvars[item].netbox_device_role | default(netbox_default_device_role)),
          'status': (hostvars[item].netbox_status | default(netbox_default_device_status)),
          'manufacturer': (hostvars[item].netbox_manufacturer | default(netbox_default_manufacturer)),
          'device_type': (hostvars[item].netbox_device_type | default(netbox_default_device_type)),
          'mgmt_interface': (hostvars[item].netbox_mgmt_interface | default(netbox_mgmt_interface)),
          'serial': (hostvars[item].netbox_serial | default('')),
          'comments': (hostvars[item].netbox_comments | default('')),
          'tags': (hostvars[item].netbox_tags | default([]))
        } ] }}"
      loop: "{{ query('inventory_hostnames', netbox_auto_host_pattern) | unique }}"

    - name: Show NetBox sync count
      ansible.builtin.debug:
        msg: "Syncing {{ netbox_hosts_effective | length }} hosts to NetBox."

    - name: Ensure Python tooling for venv is installed
      ansible.builtin.apt:
        name:
          - python3-venv
          - python3-pip
        state: present
        update_cache: true
      become: true

    - name: Ensure virtual environment exists for NetBox sync
      ansible.builtin.command: python3 -m venv {{ netbox_sync_venv_path }}
      args:
        creates: "{{ netbox_sync_venv_path }}/bin/python"

    - name: Ensure pip exists inside NetBox sync virtual environment
      ansible.builtin.command: "{{ netbox_sync_venv_path }}/bin/python -m ensurepip --upgrade"
      changed_when: false

    - name: Install pynetbox dependency in venv
      ansible.builtin.command: "{{ netbox_sync_venv_path }}/bin/python -m pip install --upgrade pynetbox"
      register: netbox_pip_install
      changed_when: >-
        ('Successfully installed' in netbox_pip_install.stdout) or
        ('Requirement already satisfied' not in netbox_pip_install.stdout)

    - name: Sync devices and management IPs into NetBox
      ansible.builtin.command:
        cmd: >-
          {{ netbox_sync_venv_path }}/bin/python
          {{ playbook_dir }}/../scripts/sync_netbox.py
          {{ (netbox_sync_dry_run | default(false) | bool) | ternary('--dry-run', '') }}
      environment:
        NETBOX_URL: "{{ netbox_url }}"
        NETBOX_TOKEN: "{{ netbox_token }}"
        NETBOX_VERIFY_SSL: "{{ netbox_verify_ssl | default(false) | ternary('true', 'false') }}"
        NETBOX_HOSTS_JSON: "{{ netbox_hosts_effective | to_json }}"
      register: netbox_sync_result
      changed_when: >-
        ('Created device:' in netbox_sync_result.stdout) or
        ('Updated device:' in netbox_sync_result.stdout) or
        ('Created IP:' in netbox_sync_result.stdout) or
        ('Updated primary IP:' in netbox_sync_result.stdout)
      no_log: "{{ netbox_sync_no_log | bool }}"

    - name: Show summarized NetBox sync result
      ansible.builtin.debug:
        msg: "NetBox sync completed successfully."
