---
- name: Update OS packages on every managed host
  hosts: all
  gather_facts: true
  become: true
  ignore_unreachable: true

  pre_tasks:
    - name: Skip Proxmox nodes (incompatible Ansible target)
      ansible.builtin.meta: end_host
      when: ansible_distribution is not defined or 'Proxmox' in (ansible_distribution | default '')

  tasks:
    - name: Detect package manager
      ansible.builtin.set_fact:
        pkg_mgr: "{{ 'apt' if ansible_pkg_mgr == 'apt' else omit }}"

    - name: Update apt cache (apt hosts)
      ansible.builtin.apt:
        update_cache: true
        cache_valid_time: 3600
      when: pkg_mgr is defined
      tags: [apt, os]

    - name: Upgrade all apt packages
      ansible.builtin.apt:
        upgrade: dist
        autoremove: true
        autoclean: true
      when: pkg_mgr is defined
      register: apt_upgrade
      changed_when: apt_upgrade is changed
      tags: [apt, os]

    - name: Report apt changes
      ansible.builtin.debug:
        msg: "OS upgraded on {{ inventory_hostname }} ({{ apt_upgrade.stdout_lines | length }} packages)"
      when: apt_upgrade is changed
      tags: [apt, os]

    - name: Refresh all installed snaps (Ubuntu)
      ansible.builtin.command: snap refresh
      register: snap_refresh
      changed_when: "'All snaps up to date' not in snap_refresh.stdout"
      failed_when: false
      when:
        - ansible_distribution == 'Ubuntu'
      tags: [snap, os]

    - name: Report snap changes
      ansible.builtin.debug:
        msg: "Snap refresh on {{ inventory_hostname }}: {{ snap_refresh.stdout | trim }}"
      when: snap_refresh is changed
      tags: [snap, os]

    - name: Restart hosts that were upgraded
      ansible.builtin.reboot:
        reboot_timeout: 300
      when:
        - apt_upgrade is defined and apt_upgrade is changed
        - ansible_service_mgr in ['systemd', 'init']
      tags: [apt, os, reboot]
