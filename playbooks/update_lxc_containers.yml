---
# This playbook updates all packages on the specified LXC containers.
- name: Update LXC containers
  hosts: lxc_containers
  ignore_unreachable: true
  become: false
  # users variable now loaded automatically from group_vars/all.yml

  tasks:
    - name: Update package cache
      ansible.builtin.apt:
        update_cache: true
        update_cache_retries: 5
        update_cache_retry_max_delay: 12
      register: apt_cache_update
      failed_when: false

    - name: Capture apt update diagnostics on failure
      ansible.builtin.command: apt-get update
      register: apt_update_diag
      changed_when: false
      failed_when: false
      when: apt_cache_update.failed | default(false)

    - name: Report apt update failure reason
      ansible.builtin.debug:
        msg:
          - "APT cache update failed on {{ inventory_hostname }}"
          - "{{ apt_cache_update.msg | default('No module message returned') }}"
          - "{{ (apt_update_diag.stderr_lines | default([]))[-8:] | join(' | ') }}"
      when: apt_cache_update.failed | default(false)

    - name: Upgrade all packages
      ansible.builtin.apt:
        # 'upgrade: dist' performs a dist-upgrade, which may remove packages.
        upgrade: dist
        autoremove: true
        autoclean: true
      register: apt_upgrade_result
      failed_when: false
      when: not (apt_cache_update.failed | default(false))

    - name: Report package upgrade failure reason
      ansible.builtin.debug:
        msg: "Package upgrade failed on {{ inventory_hostname }}: {{ apt_upgrade_result.msg | default('unknown reason') }}"
      when:
        - apt_upgrade_result is defined
        - apt_upgrade_result.failed | default(false)
