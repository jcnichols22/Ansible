---
- name: Sync Omada devices into NetBox
  hosts: localhost
  gather_facts: false
  vars_files:
    - ../inventory/prod/group_vars/all.yml

  tasks:
    - name: Load local Omada secrets if present (git-ignored)
      ansible.builtin.include_vars:
        file: ../inventory/prod/group_vars/omada_secrets.local.yml
      ignore_errors: true

    - name: Load local NetBox secrets if present (git-ignored)
      ansible.builtin.include_vars:
        file: ../inventory/prod/group_vars/netbox_secrets.local.yml
      ignore_errors: true

    - name: Validate Omada and NetBox configuration is present
      ansible.builtin.assert:
        that:
          - omada_url is defined
          - omada_url | length > 0
          - omada_username is defined
          - omada_username | length > 0
          - omada_password is defined
          - omada_password | length > 0
          - netbox_url is defined
          - netbox_url | length > 0
          - netbox_token is defined
          - netbox_token | length > 0
        fail_msg: >-
          Define omada_url/omada_username/omada_password in inventory/prod/group_vars/omada_secrets.local.yml
          and netbox_url/netbox_token in inventory/prod/group_vars/netbox_secrets.local.yml.

    - name: Ensure Python tooling for venv is installed
      ansible.builtin.apt:
        name:
          - python3-venv
          - python3-pip
        state: present
        update_cache: true
      become: true

    - name: Ensure virtual environment exists for Omada sync
      ansible.builtin.command: python3 -m venv {{ omada_sync_venv_path }}
      args:
        creates: "{{ omada_sync_venv_path }}/bin/python"

    - name: Ensure pip exists inside Omada sync virtual environment
      ansible.builtin.command: "{{ omada_sync_venv_path }}/bin/python -m ensurepip --upgrade"
      changed_when: false

    - name: Install Omada + NetBox dependencies in venv
      ansible.builtin.command: >-
        {{ omada_sync_venv_path }}/bin/python -m pip install --upgrade
        tplink-omada-client
        pynetbox
      register: omada_pip_install
      changed_when: >-
        ('Successfully installed' in omada_pip_install.stdout) or
        ('Requirement already satisfied' not in omada_pip_install.stdout)

    - name: Sync Omada devices into NetBox
      ansible.builtin.command:
        cmd: >-
          {{ omada_sync_venv_path }}/bin/python
          {{ playbook_dir }}/../scripts/sync_omada_to_netbox.py
          {{ (omada_sync_report_only | default(false) | bool) | ternary('--report-only', '') }}
          {{ (omada_sync_dry_run | default(false) | bool) | ternary('--dry-run', '') }}
      environment:
        OMADA_URL: "{{ omada_url }}"
        OMADA_USERNAME: "{{ omada_username }}"
        OMADA_PASSWORD: "{{ omada_password }}"
        OMADA_VERIFY_SSL: "{{ omada_verify_ssl | default(false) | ternary('true', 'false') }}"
        OMADA_SITE_FILTER_JSON: "{{ omada_site_filter | default([]) | to_json }}"
        OMADA_SITE_MAP_JSON: "{{ omada_site_map | default({}) | to_json }}"
        OMADA_ROLE_MAP_JSON: "{{ omada_role_map | default({}) | to_json }}"
        OMADA_DEFAULT_STATUS: "{{ omada_default_device_status | default('active') }}"
        OMADA_DEFAULT_MANUFACTURER: "{{ omada_default_manufacturer | default('TP-Link') }}"
        OMADA_MGMT_INTERFACE: "{{ omada_mgmt_interface | default('mgmt0') }}"
        OMADA_PORT_INTERFACE_PREFIX: "{{ omada_port_interface_prefix | default('port') }}"
        OMADA_INCLUDE_SITE_IN_NAME: "{{ omada_include_site_in_name | default(true) | ternary('true', 'false') }}"
        OMADA_LINK_REPORT: "{{ omada_link_report | default(false) | ternary('true', 'false') }}"
        NETBOX_URL: "{{ netbox_url }}"
        NETBOX_TOKEN: "{{ netbox_token }}"
        NETBOX_VERIFY_SSL: "{{ netbox_verify_ssl | default(false) | ternary('true', 'false') }}"
      register: omada_sync_result
      changed_when: >-
        ('Created device:' in omada_sync_result.stdout) or
        ('Updated device:' in omada_sync_result.stdout) or
        ('Created IP:' in omada_sync_result.stdout) or
        ('Updated primary IP:' in omada_sync_result.stdout) or
        ('Created/updated cable between interface ids' in omada_sync_result.stdout) or
        ('Deleted cable id' in omada_sync_result.stdout)
      no_log: "{{ omada_sync_no_log | bool }}"

    - name: Show summarized Omada sync result
      ansible.builtin.debug:
        msg: >-
          Omada sync completed.
          Report-only={{ omada_sync_report_only | bool }}