---
# Remove stale local known_hosts entries before connecting.
- name: Prepare SSH known_hosts for LXC containers
  hosts: localhost
  connection: local
  gather_facts: false

  tasks:
    - name: Remove stale known_hosts entries for each LXC container IP
      ansible.builtin.known_hosts:
        path: "{{ lookup('env', 'HOME') }}/.ssh/known_hosts"
        name: "{{ hostvars[item].ansible_host | default(item) }}"
        state: absent
      loop: "{{ groups['lxc_containers'] | default([]) }}"

# Seed root authorized_keys inside LXCs from Proxmox so first-time SSH succeeds.
- name: Bootstrap LXC root SSH keys from Proxmox
  hosts: proxmox_nodes
  gather_facts: false
  become: true
  ignore_unreachable: true
  vars:
    ansible_pubkey: "{{ lookup('file', lookup('env', 'HOME') + '/.ssh/ansible.pub') | trim }}"

  tasks:
    - name: Discover local LXC VMIDs on this Proxmox node
      ansible.builtin.shell: pct list | awk 'NR>1 {print $1}'
      args:
        executable: /bin/bash
      register: local_lxc_vmids
      changed_when: false
      failed_when: false

    - name: Build cleaned local LXC VMID list
      ansible.builtin.set_fact:
        node_lxc_vmids: "{{ local_lxc_vmids.stdout_lines | map('trim') | reject('equalto', '') | list }}"

    - name: Ensure root SSH key exists in each local LXC
      ansible.builtin.shell: |
        pct exec {{ item }} -- sh -lc "
          install -d -m 700 /root/.ssh &&
          touch /root/.ssh/authorized_keys &&
          chmod 600 /root/.ssh/authorized_keys &&
          grep -qxF {{ ansible_pubkey | quote }} /root/.ssh/authorized_keys || echo {{ ansible_pubkey | quote }} >> /root/.ssh/authorized_keys
        "
      args:
        executable: /bin/bash
      loop: "{{ node_lxc_vmids }}"
      loop_control:
        label: "vmid {{ item }}"
      register: onboard_bootstrap_keys
      changed_when: false
      failed_when: false
      when: node_lxc_vmids | length > 0

    - name: Report key bootstrap failures (non-fatal)
      ansible.builtin.debug:
        msg: "SSH key bootstrap failed for vmid {{ item.item }} on {{ inventory_hostname }}: {{ item.stderr | default(item.msg | default('unknown error')) }}"
      loop: "{{ onboard_bootstrap_keys.results | default([]) }}"
      when: item.rc is defined and item.rc != 0

# Onboard LXC containers with users and SSH keys.
- name: Onboard LXC containers
  hosts: lxc_containers
  ignore_unreachable: true
  vars:
    ansible_user: root
    lxc_apt_auto_remediate: true
  become: false
  gather_facts: true
  pre_tasks:
    - name: Probe apt update output for repository errors
      ansible.builtin.command: apt-get update
      register: apt_probe
      changed_when: false
      failed_when: false
      when: lxc_apt_auto_remediate | bool

    - name: Extract stale repository URLs from apt output
      ansible.builtin.set_fact:
        stale_repo_urls: >-
          {{
            (
              apt_probe.stderr
              | regex_findall("E:The repository '([^ ]+) [^']*' no longer has a Release file\\.")
            )
            | unique
            | list
          }}
      when: lxc_apt_auto_remediate | bool

    - name: Disable stale repositories in apt .list files
      ansible.builtin.shell: |
        set -euo pipefail
        changed=0
        ts="$(date +%Y%m%d%H%M%S)"

        for repo_url in {{ stale_repo_urls | default([]) | map('quote') | join(' ') }}; do
          escaped="$(printf '%s' "$repo_url" | sed 's|[.[\\*^$()+?{}|]|\\\\&|g')"

          while IFS= read -r file; do
            [ -f "$file" ] || continue

            if grep -Eq "^[[:space:]]*deb[[:space:]].*${escaped}" "$file"; then
              cp -a "$file" "${file}.bak_ansible_${ts}"
              sed -i -E "s|^[[:space:]]*deb([[:space:]].*${escaped}.*)$|# disabled-by-ansible stale-repo deb\\1|" "$file"
              changed=1
              echo "Disabled stale repo $repo_url in $file"
            fi
          done < <(find /etc/apt -maxdepth 2 -type f \( -name '*.list' -o -name 'sources.list' \))
        done

        if [ "$changed" -eq 1 ]; then
          echo "REPO_CHANGES_APPLIED"
        fi
      args:
        executable: /bin/bash
      register: repo_disable_result
      changed_when: "'REPO_CHANGES_APPLIED' in repo_disable_result.stdout"
      when:
        - lxc_apt_auto_remediate | bool
        - stale_repo_urls | default([]) | length > 0

    - name: Report stale repos remediated during onboarding
      ansible.builtin.debug:
        msg: "Disabled stale repositories on {{ inventory_hostname }}: {{ stale_repo_urls | join(', ') }}"
      when:
        - lxc_apt_auto_remediate | bool
        - stale_repo_urls | default([]) | length > 0
  # users variable now loaded automatically from group_vars/all.yml
  roles:
    - role: base
